name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  build-release:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact_name: grok-search-rs
            asset_name: grok-search-rs_Linux_x86_64.tar.gz
            python_platform: musllinux_1_2_x86_64
            universal: false
            zigbuild: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            artifact_name: grok-search-rs
            asset_name: grok-search-rs_Linux_aarch64.tar.gz
            python_platform: musllinux_1_2_aarch64
            universal: false
            zigbuild: true
          - target: universal-apple-darwin
            os: macos-latest
            artifact_name: grok-search-rs
            asset_name: grok-search-rs_Darwin_universal.tar.gz
            python_platform: macosx_11_0_universal2
            universal: true
            zigbuild: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact_name: grok-search-rs.exe
            asset_name: grok-search-rs_Windows_x86_64.zip
            python_platform: win_amd64
            universal: false
            zigbuild: false
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            artifact_name: grok-search-rs.exe
            asset_name: grok-search-rs_Windows_aarch64.zip
            python_platform: win_arm64
            universal: false
            zigbuild: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust (Universal macOS)
        if: matrix.universal == true
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Setup Rust
        if: matrix.universal != true
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Zig
        if: matrix.zigbuild == true
        uses: mlugg/setup-zig@v2

      - name: Install cargo-zigbuild
        if: matrix.zigbuild == true
        uses: taiki-e/install-action@cargo-zigbuild

      - name: Inject version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          echo "Injecting version $VERSION into Cargo.toml"
          python3 - "$VERSION" <<'PY'
          import sys, re, pathlib
          v = sys.argv[1]
          p = pathlib.Path("Cargo.toml")
          t = p.read_text()
          new_t, n = re.subn(r'(?m)^version\s*=\s*"[^"]+"', f'version = "{v}"', t, count=1)
          if n != 1:
              raise SystemExit("could not find version field in Cargo.toml")
          p.write_text(new_t)
          PY
          cargo update -p grok-search-rs

      - name: Build Linux with zigbuild
        if: matrix.zigbuild == true
        run: cargo zigbuild --release --target ${{ matrix.target }} --locked

      - name: Build universal macOS
        if: matrix.universal == true
        run: |
          cargo build --release --target x86_64-apple-darwin --locked
          cargo build --release --target aarch64-apple-darwin --locked
          lipo -create -output target/release/${{ matrix.artifact_name }} \
            target/x86_64-apple-darwin/release/${{ matrix.artifact_name }} \
            target/aarch64-apple-darwin/release/${{ matrix.artifact_name }}

      - name: Build
        if: matrix.universal != true && matrix.zigbuild != true
        run: cargo build --release --target ${{ matrix.target }} --locked

      - name: Package Unix
        if: matrix.os != 'windows-latest'
        run: |
          if [ "${{ matrix.universal }}" = "true" ]; then
            cd target/release
            tar czf ../../${{ matrix.asset_name }} ${{ matrix.artifact_name }}
          else
            cd target/${{ matrix.target }}/release
            tar czf ../../../${{ matrix.asset_name }} ${{ matrix.artifact_name }}
          fi

      - name: Package Windows
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          cd target/${{ matrix.target }}/release
          Compress-Archive -Path ${{ matrix.artifact_name }} -DestinationPath ../../../${{ matrix.asset_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build PyPI wheel
        shell: bash
        env:
          TAG_NAME: ${{ github.ref_name }}
          PYTHON_PLATFORM: ${{ matrix.python_platform }}
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${TAG_NAME#v}"
          else
            VERSION="$(python3 - <<'PY'
          import re, pathlib
          text = pathlib.Path("Cargo.toml").read_text()
          print(re.search(r'(?m)^version\s*=\s*"([^"]+)"', text).group(1))
          PY
          )"
          fi
          python3 - "$VERSION" <<'PY'
          import pathlib, re, sys
          version = sys.argv[1]
          pyproject = pathlib.Path("python/pyproject.toml")
          text = pyproject.read_text()
          text, n = re.subn(r'(?m)^version\s*=\s*"[^"]+"', f'version = "{version}"', text, count=1)
          if n != 1:
              raise SystemExit("could not update python/pyproject.toml version")
          pyproject.write_text(text)
          init = pathlib.Path("python/grok_search_rs/__init__.py")
          text = init.read_text()
          text, n = re.subn(r'__version__\s*=\s*"[^"]+"', f'__version__ = "{version}"', text, count=1)
          if n != 1:
              raise SystemExit("could not update python package version")
          init.write_text(text)
          PY
          rm -rf python/dist python/build python/*.egg-info
          mkdir -p python/grok_search_rs/bin
          find python/grok_search_rs/bin -type f ! -name '__init__.py' -delete
          if [[ "${{ matrix.universal }}" == "true" ]]; then
            SRC="target/release/${{ matrix.artifact_name }}"
          else
            SRC="target/${{ matrix.target }}/release/${{ matrix.artifact_name }}"
          fi
          cp "$SRC" "python/grok_search_rs/bin/${{ matrix.artifact_name }}"
          if [[ "${{ matrix.artifact_name }}" != *.exe ]]; then
            chmod +x "python/grok_search_rs/bin/${{ matrix.artifact_name }}"
          fi
          python3 -m pip install --upgrade build wheel
          python3 -m build --wheel python
          python3 -m wheel tags --remove --python-tag py3 --abi-tag none --platform-tag "$PYTHON_PLATFORM" python/dist/*.whl

      - name: Upload PyPI wheel
        uses: actions/upload-artifact@v4
        with:
          name: pypi-wheel-${{ matrix.python_platform }}
          path: python/dist/*.whl

  create-release:
    name: Create GitHub Release
    needs: build-release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts and checksums
        run: |
          cd artifacts
          mkdir -p ../flat
          find . -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec cp {} ../flat/ \;
          cd ../flat
          sha256sum *.tar.gz *.zip > SHA256SUMS

      - name: Generate changelog
        run: |
          CURRENT_TAG=${GITHUB_REF#refs/tags/}
          PREVIOUS_TAG=$(git tag --sort=-version:refname | grep -A1 "^${CURRENT_TAG}$" | tail -n1 || true)
          echo "## What's Changed" > changelog.md
          echo "" >> changelog.md
          if [ -n "$PREVIOUS_TAG" ] && [ "$PREVIOUS_TAG" != "$CURRENT_TAG" ]; then
            git log ${PREVIOUS_TAG}..${CURRENT_TAG} --pretty=format:"- %s (%h)" --no-merges >> changelog.md
            echo "" >> changelog.md
            echo "" >> changelog.md
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREVIOUS_TAG}...${CURRENT_TAG}" >> changelog.md
          else
            git log --pretty=format:"- %s (%h)" --no-merges >> changelog.md
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body_path: changelog.md
          files: |
            flat/*.tar.gz
            flat/*.zip
            flat/SHA256SUMS

  publish-npm-platforms:
    name: Publish ${{ matrix.platform }} to npm
    needs: create-release
    if: startsWith(github.ref, 'refs/tags/v') && vars.ENABLE_NPM_PUBLISH == 'true'
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - platform: linux-x64
            asset: grok-search-rs_Linux_x86_64.tar.gz
            binary: grok-search-rs
          - platform: linux-arm64
            asset: grok-search-rs_Linux_aarch64.tar.gz
            binary: grok-search-rs
          - platform: darwin-universal
            asset: grok-search-rs_Darwin_universal.tar.gz
            binary: grok-search-rs
          - platform: win32-x64
            asset: grok-search-rs_Windows_x86_64.zip
            binary: grok-search-rs.exe
          - platform: win32-arm64
            asset: grok-search-rs_Windows_aarch64.zip
            binary: grok-search-rs.exe
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: .

      - name: Prepare platform package
        shell: bash
        run: |
          cd npm/platforms/${{ matrix.platform }}
          mkdir -p bin
          if [[ "${{ matrix.asset }}" == *.zip ]]; then
            unzip ../../../${{ matrix.asset }} -d bin/
          else
            tar -xzf ../../../${{ matrix.asset }} -C bin/
          fi
          if [[ "${{ matrix.binary }}" != *.exe ]]; then
            chmod +x bin/${{ matrix.binary }}
          fi
          VERSION=${GITHUB_REF#refs/tags/v}
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Publish platform package
        if: env.NODE_AUTH_TOKEN != ''
        run: npm publish --access public --provenance
        working-directory: npm/platforms/${{ matrix.platform }}

  publish-npm:
    name: Publish main npm package
    needs: publish-npm-platforms
    if: startsWith(github.ref, 'refs/tags/v') && vars.ENABLE_NPM_PUBLISH == 'true'
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Sync npm versions
        run: |
          cd npm/grok-search-rs
          VERSION=${GITHUB_REF#refs/tags/v}
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          VERSION=${GITHUB_REF#refs/tags/v}
          export VERSION
          node - <<'NODE'
          const fs = require('fs');
          const pkg = require('./package.json');
          const version = process.env.VERSION;
          for (const dep of Object.keys(pkg.optionalDependencies || {})) {
            pkg.optionalDependencies[dep] = version;
          }
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          NODE
        env:
          VERSION: ${{ github.ref_name }}

      - name: Publish main package
        if: env.NODE_AUTH_TOKEN != ''
        run: npm publish --access public --provenance
        working-directory: npm/grok-search-rs

  publish-pypi:
    name: Publish PyPI wheels
    needs: create-release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download PyPI wheels
        uses: actions/download-artifact@v4
        with:
          pattern: pypi-wheel-*
          merge-multiple: true
          path: dist

      - name: Check wheels
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*.whl

      - name: Publish wheels to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          password: ${{ secrets.PYPI_API_TOKEN }}

  sync-main:
    name: Sync version bump back to main
    needs: [publish-npm, publish-npm-platforms, publish-pypi, create-release]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Apply version to all manifests
        shell: bash
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          echo "Applying $VERSION to source manifests"
          python3 - "$VERSION" <<'PY'
          import sys, re, pathlib
          v = sys.argv[1]
          p = pathlib.Path("Cargo.toml")
          t = p.read_text()
          new_t, n = re.subn(r'(?m)^version\s*=\s*"[^"]+"', f'version = "{v}"', t, count=1)
          if n != 1:
              raise SystemExit("could not find version field in Cargo.toml")
          p.write_text(new_t)
          PY
          cargo update -p grok-search-rs
          VERSION="$VERSION" node - <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const version = process.env.VERSION;
          const mainPath = 'npm/grok-search-rs/package.json';
          const main = JSON.parse(fs.readFileSync(mainPath, 'utf8'));
          main.version = version;
          if (main.optionalDependencies) {
            for (const dep of Object.keys(main.optionalDependencies)) {
              main.optionalDependencies[dep] = version;
            }
          }
          fs.writeFileSync(mainPath, JSON.stringify(main, null, 2) + '\n');
          const platformsDir = 'npm/platforms';
          for (const entry of fs.readdirSync(platformsDir)) {
            const pkgPath = path.join(platformsDir, entry, 'package.json');
            if (!fs.existsSync(pkgPath)) continue;
            const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
            pkg.version = version;
            fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + '\n');
          }
          NODE
          python3 - "$VERSION" <<'PY'
          import pathlib, re, sys
          v = sys.argv[1]
          for path in [pathlib.Path("python/pyproject.toml"), pathlib.Path("python/grok_search_rs/__init__.py")]:
              text = path.read_text()
              if path.name == "pyproject.toml":
                  text, n = re.subn(r'(?m)^version\s*=\s*"[^"]+"', f'version = "{v}"', text, count=1)
              else:
                  text, n = re.subn(r'__version__\s*=\s*"[^"]+"', f'__version__ = "{v}"', text, count=1)
              if n != 1:
                  raise SystemExit(f"could not update {path}")
              path.write_text(text)
          PY

      - name: Commit and push to main
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock npm/grok-search-rs/package.json npm/platforms/*/package.json python/pyproject.toml python/grok_search_rs/__init__.py
          if git diff --cached --quiet; then
            echo "main already at $VERSION, nothing to commit."
            exit 0
          fi
          git commit -m "chore: sync manifests to $VERSION [skip ci]"
          git pull --rebase origin main
          git push origin main
